<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat Online</title>
</head>

<body>

<h2>Chat Online</h2>

<p>Online agora: <span id="onlineCount">0</span></p>

<input id="nome" placeholder="Seu nome">
<br><br>

<div id="chat" style="border:1px solid black;height:300px;overflow:auto;padding:10px;"></div>

<br>

<input id="mensagem" placeholder="Digite algo">
<button id="enviar">Enviar</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getDatabase,
  ref,
  push,
  set,
  onValue,
  onChildAdded,
  onChildRemoved,
  remove,
  onDisconnect
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC-8z2erXQqogQjN89-qhvvxw3C6KMa-_w",
  authDomain: "chat-online-65224.firebaseapp.com",
  databaseURL: "https://chat-online-65224-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "chat-online-65224",
  storageBucket: "chat-online-65224.firebasestorage.app",
  messagingSenderId: "606667732591",
  appId: "1:606667732591:web:ef2ec4c2d747c0cd15bf9a"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const chat = document.getElementById("chat");
const nome = document.getElementById("nome");
const mensagem = document.getElementById("mensagem");
const botao = document.getElementById("enviar");
const onlineCount = document.getElementById("onlineCount");

const chatRef = ref(db, "mensagens");
const onlineUsersRef = ref(db, "onlineUsers");
const connectedRef = ref(db, ".info/connected");

onValue(connectedRef, (snap) => {

  if (snap.val() === true) {

    const myConnectionRef = push(onlineUsersRef);

    set(myConnectionRef, {
      online: true,
      entrouEm: Date.now()
    });

    onDisconnect(myConnectionRef).remove();
  }

});

onValue(onlineUsersRef, (snap) => {

  const data = snap.val();
  const total = data ? Object.keys(data).length : 0;

  onlineCount.textContent = total;

});

function enviarMensagem() {

  let n = nome.value.trim();
  let m = mensagem.value.trim();

  if (n === "" || m === "") return;

  const novaMsg = push(chatRef, {
    nome: n,
    texto: m
  });

  mensagem.value = "";
  mensagem.focus();

  // löschen nach 3 Stunden
  setTimeout(() => {

    remove(novaMsg);

  }, 10800000);

}

botao.addEventListener("click", enviarMensagem);

mensagem.addEventListener("keypress", function(event) {

  if (event.key === "Enter") {
    enviarMensagem();
  }

});

onChildAdded(chatRef, (data) => {

  const msg = data.val();
  const id = data.key;

  const p = document.createElement("p");

  p.id = "msg-" + id;

  p.innerHTML = "<b>" + msg.nome + ":</b> " + msg.texto;

  chat.appendChild(p);

  chat.scrollTop = chat.scrollHeight;

});

onChildRemoved(chatRef, (data) => {

  const id = data.key;

  const elemento = document.getElementById("msg-" + id);

  if (elemento) {
    elemento.remove();
  }

});

</script>

</body>
</html>
